<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BPMN + RACI İş Akışı</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.css" />
<style>
:root {
  --bg: #f5f5f5;
  --bar: #2d2d2d;
  --btn: #4a4a4a;
  --btn-h: #666;
  --node-selected: #d1ecff;
}
html, body { height: 100%; margin: 0; font-family: Arial, sans-serif; background: var(--bg); }
#toolbar {
  height: 50px; background: var(--bar); color: white;
  display: flex; align-items: center; gap: 8px; padding: 0 12px;
}
#toolbar button {
  background: var(--btn); color: white; border: none; padding: 6px 12px;
  border-radius: 6px; cursor: pointer;
}
#toolbar button:hover { background: var(--btn-h); }
#container { display: flex; height: calc(100vh - 50px); }
#canvas { flex: 1; background: #eef1f5; }
#raci-panel {
  width: 350px; background: white; border-left: 1px solid #ccc;
  padding: 10px; overflow: auto;
}
.node-body {
  padding: 8px; min-width: 120px; text-align: center;
  border: 2px solid #999; border-radius: 6px;
  background: white;
  box-shadow: 1px 1px 4px rgba(0,0,0,0.1);
}
.node-body.selected {
  background: var(--node-selected);
  border-color: #007acc;
}
.bpmn-start {
  border-radius: 50%;
  background: #d4f8d4;
  border-color: #4caf50;
}
.bpmn-end {
  border-radius: 50%;
  background: #ffd6d6;
  border-color: #e53935;
  border-width: 3px;
}
.bpmn-task {
  background: #dceeff;
  border-color: #2196f3;
}
.bpmn-decision {
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  background: #fff5d6;
  border-color: #ff9800;
}
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ccc; padding: 4px; text-align: center; }
th { background: #f0f0f0; }
td[contenteditable="true"] { background: #fff8dc; }
</style>
</head>
<body>

<div id="toolbar">
  <button onclick="addNode('Başlangıç', 'bpmn-start')">● Başlangıç</button>
  <button onclick="addNode('Görev', 'bpmn-task')">▭ Görev</button>
  <button onclick="addDecisionNode()">◇ Karar</button>
  <button onclick="addNode('Bitiş', 'bpmn-end')">■ Bitiş</button>
  <button onclick="clearFlow()">Temizle</button>
</div>

<div id="container">
  <div id="canvas" class="drawflow"></div>
  <div id="raci-panel">
    <h3>RACI Matrisi</h3>
    <table id="raci-table">
      <thead>
        <tr><th>ID</th><th>Tip</th><th>Açıklama</th><th>R</th><th>A</th><th>C</th><th>I</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.js"></script>
<script>
const editor = new Drawflow(document.getElementById('canvas'));
editor.reroute = true;
editor.start();

function addNode(label, cls) {
  const id = Math.floor(Math.random() * 100000);
  const html = `<div class="node-body ${cls}" contenteditable="true" onfocus="selectNode(this)">${label}</div>`;
  editor.addNode(label, 1, 1, 200 + Math.random()*100, 150 + Math.random()*100, label, {}, html);
  updateRaci();
}

// Karar düğümü (2 çıkışlı: Evet ve Hayır)
function addDecisionNode() {
  const id = Math.floor(Math.random() * 100000);
  const html = `<div class="node-body bpmn-decision" contenteditable="true" onfocus="selectNode(this)">Karar</div>`;
  editor.addNode('Karar', 2, 1, 250, 200, 'Karar', {}, html);
  
  // Çıkış portlarına etiket ekleme
  const nodeId = Object.keys(editor.drawflow.drawflow.Home.data).slice(-1)[0];
  const node = editor.drawflow.drawflow.Home.data[nodeId];
  node.outputs.output_1.label = "Evet";
  node.outputs.output_2.label = "Hayır";

  updateRaci();
}

function selectNode(el) {
  document.querySelectorAll('.node-body').forEach(n => n.classList.remove('selected'));
  el.classList.add('selected');
}

function updateRaci() {
  const raciTable = document.querySelector('#raci-table tbody');
  raciTable.innerHTML = '';
  const data = editor.export().drawflow.Home.data;
  for (let id in data) {
    const node = data[id];
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${node.id}</td>
      <td>${node.name}</td>
      <td contenteditable="true">${node.html.replace(/<[^>]*>/g, '')}</td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
    `;
    raciTable.appendChild(row);
  }
}

editor.on('nodeCreated', updateRaci);
editor.on('nodeRemoved', updateRaci);
editor.on('connectionCreated', updateRaci);
editor.on('connectionRemoved', updateRaci);

function clearFlow() {
  if (confirm('Tüm düğümler silinsin mi?')) {
    editor.clear();
    updateRaci();
  }
}
</script>
</body>
</html>
