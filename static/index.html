<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Akış Çizici + RACI (Minimalist)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.css">
<style>
  :root{
    --bg:#f6f7fb; --ink:#0f172a; --muted:#e5e7eb; --panel:#ffffff;
    --accent:#4a90e2; --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --node-border: #e2e8f0;
    --pastel-green:#e6f6ea; --pastel-red:#fde8ea; --pastel-blue:#e9f2fe; --pastel-amber:#fff3cd; --pastel-gray:#f8fafc;
  }

  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,Arial}
  body{display:flex;flex-direction:column;background:var(--bg);color:var(--ink)}

  /* Topbar */
  #topbar{display:flex;gap:8px;align-items:center;padding:10px;border-bottom:1px solid var(--muted);background:#fff}
  #topbar input,#topbar select{height:36px;padding:0 10px;border:1px solid #d1d5db;border-radius:8px}
  #topbar button{height:36px;padding:0 12px;border:none;border-radius:10px;background:#111827;color:#fff;cursor:pointer}
  #topbar button.secondary{background:#374151}
  #topbar button:hover{filter:brightness(1.06)}
  #spacer{flex:1}

  /* Layout */
  #wrap{flex:1;display:grid;grid-template-columns:220px 1fr 360px;grid-template-rows:1fr;gap:0;min-height:0}
  #palette{grid-column:1;background:var(--panel);border-right:1px solid var(--muted);padding:10px;overflow:auto}
  #canvas{grid-column:2;background:#f1f5f9;position:relative}
  #raci{grid-column:3;background:var(--panel);border-left:1px solid var(--muted);padding:10px;overflow:auto}

  /* Palette */
  .group-title{font-weight:700;margin:10px 6px 6px;font-size:13px;color:#334155}
  .shape{display:flex;align-items:center;gap:8px;width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;margin:6px 0;cursor:grab}
  .shape:hover{background:#f8fafc}
  .badge{font-size:12px;color:#64748b;margin-left:auto}

  /* Node Content */
  .node-box{
    padding:8px 10px; min-width:140px; text-align:center; border-radius:10px;
    border:2px solid transparent; box-shadow:0 2px 8px rgba(0,0,0,.06);
    background:#fff; transition:all .2s ease-in-out; font-weight:600;
  }
  .node-box[contenteditable="true"]:focus{outline:none}
  .drawflow-node.is-selected .node-box{border-color:var(--accent); background:#eaf3fc}

  /* Node Colors */
  .style-start{background:var(--pastel-green);border-color:#22c55e}
  .style-end{background:var(--pastel-red);border-color:#ef4444}
  .style-task{background:var(--pastel-blue);border-color:#3b82f6}
  .style-sub{background:#efe7fd;border-color:#7c3aed}
  .style-data{background:var(--pastel-amber);border-color:#f59e0b}
  .style-doc{background:#fff;border-color:#94a3b8}
  .style-io{background:#f0fdfa;border-color:#14b8a6}
  .style-note{background:var(--pastel-gray);border-color:#94a3b8}

  /* Minimalist Karar Düğümü */
  .diamond-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 15px; background: #ffffff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.05); border: 2px solid transparent; transition: all 0.2s; }
  .drawflow-node.is-selected .diamond-wrap { border-color: var(--primary); background:#eaf3fc; }
  .drawflow-node.decision { width: 170px !important; }
  .diamond { width: 45px; height: 45px; background: white; border: 2px solid var(--node-border); transform: rotate(45deg); transition: all 0.3s ease; margin-top: 5px; }
  .diamond-label { font-size: 13px; font-weight: 600; color: #334155; text-align: center; width: 100%; }
  .decision-actions { display: flex; gap: 10px; width: 100%; justify-content: center; }
  .evet-label, .hayir-label { font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; background: #f1f5f9; font-weight: 600; user-select: none; color: #64748b; }
  .evet-label:hover { background: #dcfce7; color: var(--success); }
  .hayir-label:hover { background: #fee2e2; color: var(--danger); }
  .evet-label.active { background: var(--success); color: white; }
  .hayir-label.active { background: var(--danger); color: white; }
  .diamond.active { border-color: var(--primary); background: #eff6ff; }

  /* RACI Table */
  h3{margin:6px 0 10px}
  table{border-collapse:collapse;width:100%}
  th,td{border:1px solid #e5e7eb;padding:6px;text-align:center}
  thead th{background:#f8fafc}
  td[contenteditable="true"]{background:#fff}
  .small{font-size:12px;color:#6b7280}
</style>
</head>
<body>

<div id="topbar">
  <strong>Akış Çizici</strong>
  <div id="spacer"></div>
  <input id="flowName" placeholder="örn. flow1" value="flow1"/>
  <button onclick="newFlow()" class="secondary">Yeni</button>
  <button onclick="saveFlow()">Kaydet</button>
  <select id="openSelect" title="Kayıtlar"></select>
  <button onclick="openSelected()" class="secondary">Aç</button>
  <button onclick="exportJSON()" class="secondary">Dışa Aktar</button>
</div>

<div id="wrap">
  <div id="palette">
    <div class="group-title">Temel Düğümler</div>
    <div class="shape" draggable="true" data-type="Başlangıç" data-style="style-start">● Başlangıç</div>
    <div class="shape" draggable="true" data-type="Görev" data-style="style-task">▭ Görev</div>
    <div class="shape" draggable="true" data-type="Karar" data-style="">◇ Karar (E/H)</div>
    <div class="shape" draggable="true" data-type="Bitiş" data-style="style-end">○ Bitiş</div>
  </div>

  <div id="canvas" class="drawflow"></div>

  <div id="raci">
    <h3>RACI Matrisi</h3>
    <table>
      <thead><tr><th>ID</th><th>Tür</th><th>İş</th><th>R</th><th>A</th><th>C</th><th>I</th></tr></thead>
      <tbody id="raciBody"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.js"></script>
<script>
  let editor = null;
  let raciState = {};

  const htmlBox = (label, extra='') => `<div class="node-box ${extra}" contenteditable="true" spellcheck="false">${label}</div>`;
  const htmlDecision = () => `
    <div class="diamond-wrap">
      <div class="diamond"></div>
      <div class="diamond-label" contenteditable="true" spellcheck="false">Karar</div>
      <div class="decision-actions">
          <div class="evet-label">Evet</div>
          <div class="hayir-label">Hayır</div>
      </div>
    </div>`;

  function addNodeByType(type, x=220, y=140){
    let inputs=1, outputs=1, html='', nodeClass='';
    switch(type){
      case 'Başlangıç': html=htmlBox('Başlangıç','style-start'); inputs=0; outputs=1; break;
      case 'Bitiş':     html=htmlBox('Bitiş','style-end'); inputs=1; outputs=0; break;
      case 'Karar':     html=htmlDecision(); inputs=1; outputs=2; nodeClass='decision'; break;
      default:          html=htmlBox(type, 'style-task'); inputs=1; outputs=1; break;
    }
    return editor.addNode(type, inputs, outputs, x, y, nodeClass, {}, html);
  }

  function updateRACI(){
    const tbody = document.getElementById('raciBody');
    if(!tbody || !editor) return;
    tbody.innerHTML = '';
    const data = (editor.export().drawflow.Home || {data:{}}).data;
    const fname = document.getElementById('flowName').value;
    for(const id in data){
      const n = data[id];
      const saved = (raciState[fname] && raciState[fname][id]) ? raciState[fname][id] : {desc:(n.html||'').replace(/<[^>]+>/g,''),R:'',A:'',C:'',I:''};
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${id}</td><td>${n.name}</td><td contenteditable="true" data-k="desc">${saved.desc}</td><td contenteditable="true" data-k="R">${saved.R}</td><td contenteditable="true" data-k="A">${saved.A}</td><td contenteditable="true" data-k="C">${saved.C}</td><td contenteditable="true" data-k="I">${saved.I}</td>`;
      tbody.appendChild(tr);
    }
  }

  window.onload = function() {
    editor = new Drawflow(document.getElementById('canvas'));
    editor.start();
    
    // Olay Dinleyicileri
    editor.on('nodeCreated', updateRACI);
    editor.on('nodeRemoved', updateRACI);
    
    document.querySelectorAll('.shape').forEach(el => {
      el.addEventListener('dragstart', e => e.dataTransfer.setData('type', el.dataset.type));
    });

    document.getElementById('canvas').addEventListener('dragover', e => e.preventDefault());
    document.getElementById('canvas').addEventListener('drop', e => {
      e.preventDefault();
      addNodeByType(e.dataTransfer.getData('type'), (e.clientX-220)/editor.zoom, (e.clientY-50)/editor.zoom);
    });

    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('evet-label') || e.target.classList.contains('hayir-label')) {
        e.target.classList.toggle('active');
        const wrap = e.target.closest('.diamond-wrap');
        if(wrap) wrap.querySelector('.diamond').classList.add('active');
      }
    });
  };

  function saveFlow(){ localStorage.setItem('flow', JSON.stringify(editor.export())); alert('Kaydedildi.'); }
  function newFlow(){ editor.clear(); updateRACI(); }
  function exportJSON(){ const a=document.createElement('a'); a.href='data:application/json,'+JSON.stringify(editor.export()); a.download='flow.json'; a.click(); }
</script>
</body>
</html>
