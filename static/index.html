<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>İş Akışı Çizici + RACI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.css" />
<style>
:root {
  --bg: #f7f7fb;
  --ink: #111;
  --bar: #23272f;
  --btn: #3a3f4b;
  --btn-h: #4a5060;
}
html, body {
  height: 100%;
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}
body {
  background: var(--bg);
  color: var(--ink);
  display: flex;
  flex-direction: column;
}
#toolbar {
  height: 56px;
  background: var(--bar);
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
}
#toolbar button {
  height: 34px;
  padding: 0 12px;
  border: none;
  border-radius: 10px;
  background: var(--btn);
  color: #fff;
  cursor: pointer;
}
#toolbar button:hover { background: var(--btn-h); }
#main {
  flex: 1;
  display: flex;
}
#canvas {
  flex: 2;
  height: calc(100vh - 56px);
  background: #f0f2f6;
}
#raci-panel {
  flex: 1;
  background: #fff;
  border-left: 1px solid #ccc;
  padding: 10px;
  overflow: auto;
}
.node-body {
  padding: 8px 10px;
  min-width: 140px;
  text-align: center;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
/* Karar düğümü (elmas) */
.decision-node {
  width: 100px;
  height: 100px;
  background: white;
  border: 2px solid #333;
  transform: rotate(45deg);
  position: relative;
  margin: auto;
}
.decision-node .node-label {
  transform: rotate(-45deg);
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-45deg);
  font-weight: bold;
}
/* Portlar */
.decision-node .output {
  width: 12px;
  height: 12px;
  background: #333;
  border-radius: 50%;
  position: absolute;
  transform: rotate(-45deg);
}
.decision-node .output_1 {
  right: -10px;
  bottom: -10px; /* Evet */
}
.decision-node .output_2 {
  left: -10px;
  bottom: -10px; /* Hayır */
}
</style>
</head>
<body>
<div id="toolbar">
  <strong>İş Akışı</strong>
  <button onclick="addNode('Başlangıç', 'green')">● Başlangıç</button>
  <button onclick="addNode('Görev', 'lightblue')">▭ Görev</button>
  <button onclick="addDecisionNode()">◇ Karar</button>
  <button onclick="addNode('Bitiş', 'red')">■ Bitiş</button>
  <button onclick="clearFlow()">Temizle</button>
</div>
<div id="main">
  <div id="canvas" class="drawflow"></div>
  <div id="raci-panel">
    <h3>RACI Matrisi</h3>
    <table id="raci-table" border="1" cellpadding="5" style="border-collapse: collapse; width:100%;">
      <thead>
        <tr><th>ID</th><th>Tip</th><th>Açıklama</th><th>R</th><th>A</th><th>C</th><th>I</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.js"></script>
<script>
const el = document.getElementById('canvas');
const editor = new Drawflow(el);
editor.reroute = true;
editor.start();

// Genel node ekleme
function addNode(label, color) {
  const html = `<div class="node-body" style="background:${color};">
    <div contenteditable="true" spellcheck="false">${label}</div>
  </div>`;
  editor.addNode(label, 1, 1, 200, 200, label, {}, html);
  updateRaciMatrix();
}

// Karar node ekleme
function addDecisionNode() {
  const html = `
    <div class="decision-node">
      <div class="node-label" contenteditable="true" spellcheck="false">Karar</div>
    </div>
  `;
  editor.addNode('Karar', 2, 1, 300, 200, 'Karar', {}, html);
  updateRaciMatrix();
}

// Temizleme
function clearFlow() {
  if (confirm('Tüm düğümler silinsin mi?')) {
    editor.clear();
    updateRaciMatrix();
  }
}

// RACI Matrisi güncelleme
function updateRaciMatrix() {
  const tbody = document.querySelector('#raci-table tbody');
  tbody.innerHTML = '';
  const data = editor.export();
  let nodes = data.drawflow.Home.data;
  for (let id in nodes) {
    let node = nodes[id];
    let desc = node.html.replace(/<[^>]*>?/gm, '').trim();
    let row = document.createElement('tr');
    row.innerHTML = `
      <td>${node.id}</td>
      <td>${node.name}</td>
      <td>${desc}</td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
    `;
    tbody.appendChild(row);
  }
}

// Node değiştiğinde matrisi güncelle
editor.on('nodeCreated', updateRaciMatrix);
editor.on('nodeRemoved', updateRaciMatrix);
editor.on('nodeDataChanged', updateRaciMatrix);
</script>
</body>
</html>
