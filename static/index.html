<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>İş Akışı Çizici</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.css">
<style>
  html, body { height: 100%; margin: 0; font-family: sans-serif; }
  #toolbar {
    height: 50px; background: #333; color: white;
    display: flex; align-items: center; gap: 8px; padding: 0 10px;
  }
  #toolbar button {
    background: #555; color: white; border: none; padding: 6px 12px; cursor: pointer;
  }
  #toolbar button:hover { background: #777; }
  #drawflow { height: calc(100vh - 50px); background: #f5f5f5; }
  .node-body {
    padding: 10px; min-width: 120px; text-align: center;
    background: white; border-radius: 8px; border: 1px solid #ccc;
  }
</style>
</head>
<body>

<div id="toolbar">
  <button onclick="addNode('Başlangıç')">● Başlangıç</button>
  <button onclick="addNode('Görev')">+ Görev</button>
  <button onclick="addNode('Karar')">◇ Karar</button>
  <button onclick="addNode('Bitiş')">■ Bitiş</button>
  <button onclick="generateRaciMatrix()">📊 RACI Matrisi</button>
</div>

<div id="drawflow" class="drawflow"></div>

<script src="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.js"></script>
<script>
  const editor = new Drawflow(document.getElementById('drawflow'));
  editor.reroute = true;
  editor.start();

  function nodeTemplate(label) {
    return `<div class="node-body" contenteditable="true">${label}</div>`;
  }

  function addNode(label) {
    const id = Math.floor(Math.random() * 10000);
    const x = 200 + Math.random() * 200;
    const y = 100 + Math.random() * 100;
    editor.addNode(label, 1, 1, x, y, label, {}, nodeTemplate(label));
  }

  function generateRaciMatrix() {
    const data = editor.export();
    const raciData = data.drawflow.Home.data;
    let matrix = [];

    for (let id in raciData) {
      const node = raciData[id];
      const desc = node.html.replace(/<[^>]*>?/gm, '').trim();
      matrix.push({
        AdımID: node.id,
        Tip: node.name,
        Açıklama: desc,
        Responsible: "",
        Accountable: "",
        Consulted: "",
        Informed: ""
      });
    }

    console.table(matrix);
    alert("RACI matrisi konsola yazdırıldı!");
  }
</script>

</body>
</html>
