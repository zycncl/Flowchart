<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>İş Akışı + RACI Matrisi</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.css" />
<style>
  body { margin:0; font-family: Arial, sans-serif; display:flex; flex-direction:column; height:100vh; }
  #toolbar { background:#333; color:#fff; padding:8px; display:flex; gap:8px; align-items:center; }
  #toolbar button { padding:6px 10px; border:none; background:#555; color:white; cursor:pointer; border-radius:5px; }
  #toolbar button:hover { background:#777; }
  #main { display:flex; flex:1; }
  #canvas { flex:2; background:#f0f2f6; }
  #raci { flex:1; background:#fafafa; border-left:1px solid #ddd; overflow:auto; padding:10px; }
  table { border-collapse: collapse; width:100%; }
  th, td { border:1px solid #ccc; padding:5px; text-align:center; }
  th { background:#eee; }
  /* Şekil stilleri */
  .node-body { padding:8px; background:white; text-align:center; }
  .start { border-radius:50%; width:80px; height:80px; display:flex; align-items:center; justify-content:center; background:#d1e7dd; }
  .end { border-radius:50%; width:80px; height:80px; display:flex; align-items:center; justify-content:center; background:#f8d7da; }
  .task { border-radius:6px; background:#fff3cd; padding:15px; }
  .decision { width:0; height:0; border:50px solid transparent; border-top-color:#cfe2ff; transform:rotate(45deg); position:relative; }
  .decision span { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-45deg); }
</style>
</head>
<body>

<div id="toolbar">
  <button onclick="addNode('Görev')">+ Görev</button>
  <button onclick="addNode('Karar')">◇ Karar</button>
  <button onclick="addNode('Başlangıç')">● Başlangıç</button>
  <button onclick="addNode('Bitiş')">■ Bitiş</button>
</div>

<div id="main">
  <div id="canvas" class="drawflow"></div>
  <div id="raci">
    <h3>RACI Matrisi</h3>
    <table id="raciTable">
      <thead>
        <tr>
          <th>Görev</th>
          <th>PM</th>
          <th>Analist</th>
          <th>Geliştirici</th>
          <th>Testçi</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td contenteditable="true">Örnek Görev</td>
          <td contenteditable="true">R</td>
          <td contenteditable="true">A</td>
          <td contenteditable="true">C</td>
          <td contenteditable="true">I</td>
        </tr>
      </tbody>
    </table>
    <button onclick="addRaciRow()">+ Satır Ekle</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.js"></script>
<script>
  const editor = new Drawflow(document.getElementById('canvas'));
  editor.reroute = true;
  editor.start();

  function nodeTemplate(label) {
    if (label === 'Başlangıç') return `<div class="node-body start">${label}</div>`;
    if (label === 'Bitiş') return `<div class="node-body end">${label}</div>`;
    if (label === 'Görev') return `<div class="node-body task">${label}</div>`;
    if (label === 'Karar') return `<div class="node-body decision"><span>${label}</span></div>`;
    return `<div class="node-body">${label}</div>`;
  }

  function addNode(label) {
    const id = Math.floor(Math.random() * 100000);
    const x = 200 + Math.random()*200;
    const y = 100 + Math.random()*200;
    editor.addNode(label, 1, 1, x, y, label, {}, nodeTemplate(label));
  }

  function addRaciRow() {
    const table = document.getElementById('raciTable').getElementsByTagName('tbody')[0];
    const row = table.insertRow();
    row.innerHTML = `
      <td contenteditable="true">Yeni Görev</td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
    `;
  }
</script>

</body>
</html>
