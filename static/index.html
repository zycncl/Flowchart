<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>İş Akışı Çizici + RACI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.css" />
<style>
:root {
  --bg: #f7f7fb;
  --ink: #111;
  --bar: #23272f;
  --btn: #3a3f4b;
  --btn-h: #4a5060;
}
html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; }
body { background: var(--bg); color: var(--ink); display: flex; flex-direction: column; }
#toolbar { height: 56px; background: var(--bar); color: #fff; display: flex; align-items: center; gap: 8px; padding: 0 12px; }
#toolbar button { height: 34px; padding: 0 12px; border: none; border-radius: 10px; background: var(--btn); color: #fff; cursor: pointer; }
#toolbar button:hover { background: var(--btn-h); }
#main { flex: 1; display: flex; }
#canvas { flex: 3; background: #f0f2f6; }
#raci-panel { flex: 1; border-left: 1px solid #ddd; background: #fff; padding: 10px; overflow: auto; }
.node-body { text-align: center; }
.node-body input { border: none; background: transparent; width: 100%; text-align: center; font-size: 14px; }
.start-node { width: 60px; height: 60px; background: green; border-radius: 50%; margin: auto; display: flex; align-items: center; justify-content: center; color: white; }
.task-node { padding: 10px; border: 2px solid #555; border-radius: 4px; background: white; }
.end-node { width: 60px; height: 60px; border: 4px solid black; border-radius: 50%; margin: auto; display: flex; align-items: center; justify-content: center; }
.decision-node { width: 80px; height: 80px; background: white; border: 2px solid #555; transform: rotate(45deg); margin: auto; display: flex; align-items: center; justify-content: center; }
.decision-node input { transform: rotate(-45deg); }
.selected { outline: 3px solid orange; }
table { width: 100%; border-collapse: collapse; }
th, td { border: 1px solid #ddd; padding: 4px; text-align: center; }
</style>
</head>
<body>

<div id="toolbar">
  <button onclick="addNode('Başlangıç')">● Başlangıç</button>
  <button onclick="addNode('Görev')">▭ Görev</button>
  <button onclick="addNode('Karar')">◇ Karar</button>
  <button onclick="addNode('Bitiş')">○ Bitiş</button>
</div>

<div id="main">
  <div id="canvas" class="drawflow"></div>
  <div id="raci-panel">
    <h3>RACI Matrisi</h3>
    <table id="raci-table">
      <thead>
        <tr><th>ID</th><th>Tip</th><th>Açıklama</th><th>R</th><th>A</th><th>C</th><th>I</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.js"></script>
<script>
const editor = new Drawflow(document.getElementById('canvas'));
editor.reroute = true;
editor.start();

// Node template
function nodeTemplate(type) {
  let html = '';
  if(type === 'Başlangıç') html = `<div class="node-body start-node"><input value="Başla" /></div>`;
  if(type === 'Görev') html = `<div class="node-body task-node"><input value="Görev" /></div>`;
  if(type === 'Bitiş') html = `<div class="node-body end-node"><input value="Bitiş" /></div>`;
  if(type === 'Karar') html = `<div class="node-body decision-node"><input value="Karar" /></div>`;
  return html;
}

function addNode(type) {
  const x = 200 + Math.random() * 200;
  const y = 100 + Math.random() * 200;
  let outputs = 1;
  if(type === 'Karar') outputs = 2;
  editor.addNode(type, 1, outputs, x, y, type, {}, nodeTemplate(type));
  updateRaci();
}

// Seçim rengi
editor.on('nodeSelected', id => {
  document.querySelectorAll('.drawflow-node').forEach(n => n.classList.remove('selected'));
  const el = document.querySelector(`#node-${id}`);
  if(el) el.classList.add('selected');
});

// Karar çıkış isimleri
editor.on('connectionCreated', conn => {
  if(conn.output_id && editor.getNodeFromId(conn.output_id).name === 'Karar') {
    const linkEl = document.querySelector(`[data-id="${conn.output_id}"]`);
    if(linkEl) {
      const label = conn.output_class === 'output_1' ? 'Evet' : 'Hayır';
      const path = document.querySelector(`path[connection_id="${conn.output_id}-${conn.output_class}-${conn.input_id}-${conn.input_class}"]`);
      if(path) {
        const midX = (path.getBBox().x + path.getBBox().width/2);
        const midY = (path.getBBox().y + path.getBBox().height/2);
        const text = document.createElementNS("http://www.w3.org/2000/svg","text");
        text.setAttribute("x", midX);
        text.setAttribute("y", midY);
        text.setAttribute("fill", "#000");
        text.setAttribute("font-size", "10");
        text.textContent = label;
        path.parentNode.appendChild(text);
      }
    }
  }
});

// RACI otomatik güncelleme
function updateRaci() {
  const tbody = document.querySelector('#raci-table tbody');
  tbody.innerHTML = '';
  const data = editor.export().drawflow.Home.data;
  for(let id in data) {
    const node = data[id];
    const row = `<tr>
      <td>${id}</td>
      <td>${node.name}</td>
      <td>${node.html.replace(/<[^>]+>/g,'')}</td>
      <td><input size="1"></td>
      <td><input size="1"></td>
      <td><input size="1"></td>
      <td><input size="1"></td>
    </tr>`;
    tbody.innerHTML += row;
  }
}

editor.on('nodeCreated', updateRaci);
editor.on('nodeRemoved', updateRaci);
editor.on('nodeDataChanged', updateRaci);

</script>
</body>
</html>
